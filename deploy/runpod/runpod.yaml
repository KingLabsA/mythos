apiVersion: runpod.ai/v1
kind: ServerlessEndpoint
metadata:
  name: mythos-unhinged-primary
  labels:
    project: fable-mythos
    tier: primary
spec:
  gpu:
    type: "NVIDIA RTX 4090"
    count: 1
    memory: 24Gi
  image:
    repository: fableforge/mythos-vllm
    tag: latest
    pullPolicy: Always
  env:
    - name: MODEL_NAME
      value: "FableForge-AI/mythos-9b-unhinged"
    - name: SERVED_MODEL_NAME
      value: "mythos-9b-unhinged"
    - name: MAX_MODEL_LEN
      value: "4096"
    - name: PORT
      value: "8000"
    - name: GPU_MEMORY_UTILIZATION
      value: "0.92"
    - name: DTYPE
      value: "auto"
    - name: HF_TOKEN
      value: "${HF_TOKEN}"
  network:
    port: 8000
    protocol: HTTP
  healthCheck:
    path: /health
    port: 8000
    intervalSeconds: 30
    timeoutSeconds: 10
    initialDelaySeconds: 120
  scaling:
    minWorkers: 1
    maxWorkers: 4
    idleTimeoutSeconds: 300
  volume:
    mountPath: /models
    sizeGi: 50
  resources:
    cpu: 4
    memory: 16Gi
---
